version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
        emit_db_tags: false
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "geography"
            go_type: "string"
          - db_type: "geometry"
            go_type: "string"
          - db_type: "uuid"
            go_type: "github.com/jackc/pgx/v5/pgtype.UUID"

# Fly.io · STAGING · separate app so production is never touched.
# Deploy with:  flyctl deploy -c fly.staging.toml
# Mumbai region for low latency to Srinagar.
app = "kashmir-explorer-api-staging"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  ENV = "staging"
  LOG_LEVEL = "debug"
  # Secrets (DATABASE_URL, REDIS_URL, JWT_*, API keys) are NOT set here —
  # set them with `flyctl secrets set ... -a kashmir-explorer-api-staging`.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

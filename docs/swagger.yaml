info:
  contact: {}
  description: Backend API for the Kashmir Explorer travel app.
  title: Kashmir Explorer API
  version: 0.1.0
paths:
  /v1/admin/advisories:
    post:
      consumes:
      - application/json
      parameters:
      - description: Advisory
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_advisory.AdminAdvisoryInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_kashmir-explorer_api_pkg_response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/internal_advisory.Advisory'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_kashmir-explorer_api_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Create + broadcast an advisory (admin)
      tags:
      - admin-advisories
  /v1/admin/advisories/{id}:
    delete:
      parameters:
      - description: Advisory ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Expire (clear) an advisory (admin)
      tags:
      - admin-advisories
    put:
      consumes:
      - application/json
      parameters:
      - description: Advisory ID
        in: path
        name: id
        required: true
        type: string
      - description: Advisory
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_advisory.AdminAdvisoryInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_kashmir-explorer_api_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Update an advisory (admin)
      tags:
      - admin-advisories
  /v1/admin/categories:
    post:
      consumes:
      - application/json
      parameters:
      - description: Category
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_destination.CategoryInput'

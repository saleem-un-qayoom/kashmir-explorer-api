      - taxonomy
    put:
      consumes:
      - application/json
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      - description: Category
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_destination.CategoryInput'
      produces:
